name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bunx oxlint .

  test:
    needs: install
    runs-on: ubuntu-latest
    env:
      FIREBASE_AUTH_EMULATOR_HOST: "127.0.0.1:9099"
      DATABASE_URL: "postgres://rocksa:rocksa@localhost:5432/rocksa"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rocksa
          POSTGRES_PASSWORD: rocksa
          POSTGRES_DB: rocksa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun --filter @rocksa/db migrate
        env:
          DATABASE_URL: "postgres://rocksa:rocksa@localhost:5432/rocksa"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Auth Emulator
        run: firebase emulators:start --only auth --project rocksa-dev &

      - name: Start API
        run: FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099 bun --filter @rocksa/api start &

      - name: Wait for services
        run: npx wait-on tcp:9099 tcp:8787 --timeout 30000

      - name: Debug API health
        run: curl -v http://localhost:8787/health

      - name: Debug sync endpoint
        run: |
          curl -v -X POST http://localhost:8787/v1/me/sync \
            -H "Authorization: Bearer fake-token" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Debug token decode
        run: |
          # Zarejestruj usera przez emulator i pobierz token
          curl -s -X POST \
            "http://127.0.0.1:9099/identitytoolkit.googleapis.com/v1/accounts:signUp?key=demo-api-key" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com","password":"password123","returnSecureToken":true}' \
            | tee /tmp/token.json
          TOKEN=$(cat /tmp/token.json | python3 -c "import sys,json; print(json.load(sys.stdin)['idToken'])")
          curl -s -X POST http://localhost:8787/debug-token \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"

      - name: Run tests
        run: bun test

  build:
    needs: [typecheck, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bun --filter=@rocksa/web run build